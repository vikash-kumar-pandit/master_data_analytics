name: Deploy Frontend to gh-pages Branch

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-data-platform/frontend/package-lock.json

      - name: Install dependencies
        working-directory: my-data-platform/frontend
        run: npm ci

      - name: Build frontend
        working-directory: my-data-platform/frontend
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: my-data-platform/frontend/dist
          publish_branch: gh-pages
          force_orphan: true
