name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-format:
    name: Lint & Format Check (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Check Formatting
        run: ruff format --check backend/

      - name: Run Linter
        run: ruff check backend/

  type-check:
    name: Static Type Check (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install mypy
          pip install -r backend/requirements.txt

      - name: Run Mypy
        run: mypy backend/

  unit-tests:
    name: Pytest Coverage Check (Backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libjpeg-dev libopenjp2-7-dev libffi-dev shared-mime-info

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest-cov
          pip install -r backend/requirements.txt

      - name: Run Tests with Coverage Gate
        run: |
          cd backend
          pytest --cov=. --cov-report=xml --cov-fail-under=80 tests/

      - name: Upload Coverage Results
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.xml

  frontend-build:
    name: Build Check (Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node Dependencies
        run: |
          cd frontend
          npm ci

      - name: Type Check React app
        run: |
          cd frontend
          npm run type-check

      - name: Build Vite assets
        run: |
          cd frontend
          npm run build
