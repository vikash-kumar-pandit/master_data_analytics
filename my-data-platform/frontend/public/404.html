<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect unknown route to app root
      var path = window.location.pathname;
      var repoBase = '/maste_data_analytics/';
      if (path.indexOf(repoBase) !== 0) {
        window.location.replace(repoBase);
      } else {
        window.location.replace(repoBase + '?redirect=' + encodeURIComponent(path));
      }
    </script>
  </head>
  <body></body>
</html>
