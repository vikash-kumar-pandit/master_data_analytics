version: '3.8'

services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: WARNING

  worker:
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: WARNING

  flower:
    # Disable by default in production; can be spun up explicitly if needed
    profiles:
      - development

  nginx:
    ports:
      - "80:80"
    restart: unless-stopped
    profiles:
      - production
      - staging
