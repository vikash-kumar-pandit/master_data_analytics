version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: data-platform-cache
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - data-platform-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: data-platform-api
    environment:
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - data-platform-network
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: data-platform-worker
    command: celery -A worker.celery_app worker --loglevel=info -c 4 --max-tasks-per-child=1000
    environment:
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - redis
      - backend
    networks:
      - data-platform-network
    volumes:
      - ./backend:/app
      - /app/__pycache__

networks:
  data-platform-network:
    driver: bridge
